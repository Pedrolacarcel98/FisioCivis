<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú Desplegable</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white">

  <nav class="bg-white shadow-md p-4 flex items-center justify-between relative">
    <!-- Logo -->
    <a href="index.html" class="flex items-center">
      <img src="images/Fisiocivis.png" alt="Fisiocivis Logo" class="h-12">
    </a>

    <!-- Botón para dispositivos pequeños -->
    <button id="menu-toggle" class="md:hidden text-teal-600 focus:outline-none">
      <!-- Icono hamburguesa -->
      <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" 
           xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path>
      </svg>
    </button>

    <!-- Menú -->
    <ul id="menu" class="hidden absolute top-full left-0 right-0 bg-white  mt-2 p-4 flex-col space-y-4 text-teal-600 font-semibold md:static md:flex md:flex-row md:space-y-0 md:space-x-6 md:mt-0 md:p-0">
      <li><a href="index.html" class="hover:text-teal-600">Inicio</a></li>
      <li class="relative group">
        <a href="servicios.html" class="hover:text-teal-600">Servicios</a>
        <ul class="hidden group-hover:block absolute bg-white shadow-lg p-2 space-y-2 text-sm">
          <li><a href="#" class="block hover:text-teal-400">Fisioterapia neurológica</a></li>
          <li><a href="#" class="block hover:text-teal-400">Fisioterapia respiratoria</a></li>
          <li><a href="#" class="block hover:text-teal-400">Fisioterapia geriátrica</a></li>
          <li><a href="#" class="block hover:text-teal-400">Fisioterapia traumatológica</a></li>
        </ul>
      </li>
      <li><a href="precios.html" class="hover:text-teal-400">Precios & Bonos</a></li>
      <li><a href="contacto.html" class="hover:text-teal-400">Contacto</a></li>
      <li><a href="saber.html" class="hover:text-teal-400">Saber más</a></li>
    </ul>
  </nav>

  <script src="header.js"></script>
</body>
</html>
